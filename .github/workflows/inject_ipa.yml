name: Inject TwitchProxy into IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        required: true
        type: string
        default: ""

      app_name:
        description: "App name override"
        required: false
        type: string
        default: "Twitch"

      bundle_id:
        description: "Bundle ID override (leave empty to keep the original app ID)"
        required: false
        type: string
        default: ""

      display_name:
        description: "Display name for the output IPA"
        required: true
        type: string
        default: "Twitch+Proxy"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  inject_and_package:
    name: Inject TwitchProxy and Package
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Theos path
        run: echo "THEOS=${{ github.workspace }}/theos" >> "$GITHUB_ENV"

      - name: Cache Theos
        id: theos
        uses: actions/cache@v4
        env:
          cache-name: theos_cache_twitch
        with:
          path: theos/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Setup Theos
        if: steps.theos.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        if: steps.theos.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk "$THEOS/sdks"

      - name: Bundle userscript reference
        run: |
          mkdir -p "resources/Library/Application Support/TwitchProxy"
          cp twitch.user.js "resources/Library/Application Support/TwitchProxy/twitch_proxy.js"

      - name: Install dependencies
        run: brew install ldid dpkg

      - name: Build TwitchProxy.dylib
        run: |
          make clean
          make package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless

      - name: Extract dylib from package
        run: |
          mkdir -p dylib_output

          for deb in packages/*.deb; do
            if [ -f "$deb" ]; then
              dpkg -x "$deb" dylib_output/
              break
            fi
          done

          find dylib_output -name "*.dylib" -exec cp {} . \;

          DYLIB=$(find . -maxdepth 1 -name "*.dylib" | grep -v "\.dylib\." || true)
          if [ -z "$DYLIB" ]; then
            find .theos/obj -name "*.dylib" -exec cp {} . \;
          fi

          ls -lh *.dylib

      - name: Download and validate IPA
        run: |
          if [ -z "${{ github.event.inputs.ipa_url }}" ]; then
            echo "::error::IPA URL is required"
            exit 1
          fi

          wget "${{ github.event.inputs.ipa_url }}" --no-verbose -O input.ipa

          file_type=$(file --mime-type -b input.ipa)
          echo "File type: $file_type"

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject TwitchProxy into IPA
        run: |
          DYLIB=$(find . -maxdepth 1 \( -name "TwitchProxy.dylib" -o -name "com.*.dylib" \) | head -n 1)

          if [ -z "$DYLIB" ]; then
            echo "::error::TwitchProxy.dylib not found"
            exit 1
          fi

          OUTPUT_NAME="${{ github.event.inputs.display_name }}.ipa"
          CYAN_ARGS=(-i input.ipa -o "$OUTPUT_NAME" -wef "$DYLIB")

          if [ -n "${{ github.event.inputs.app_name }}" ]; then
            CYAN_ARGS+=(-n "${{ github.event.inputs.app_name }}")
          fi

          if [ -n "${{ github.event.inputs.bundle_id }}" ]; then
            CYAN_ARGS+=(-b "${{ github.event.inputs.bundle_id }}")
          fi

          cyan "${CYAN_ARGS[@]}"

          if [ ! -f "$OUTPUT_NAME" ]; then
            echo "::error::Output IPA not created"
            exit 1
          fi

      - name: Verify dylib injection
        run: |
          OUTPUT_NAME="${{ github.event.inputs.display_name }}.ipa"

          mkdir -p verify_ipa
          cd verify_ipa
          unzip -q "../$OUTPUT_NAME"

          if find Payload -name "*.dylib" | grep -v "Frameworks" | grep -q .; then
            echo "Dylib found in IPA:"
            find Payload -name "*.dylib" -not -path "*/Frameworks/*"
          else
            echo "::warning::No dylib found outside Frameworks"
          fi

          APP=$(find Payload -name "*.app" -type d | head -n 1)
          if [ -n "$APP" ]; then
            INFO="$APP/Info.plist"
            /usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$INFO" || true
            /usr/libexec/PlistBuddy -c "Print UISupportedInterfaceOrientations" "$INFO" || true
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: twitch-proxy-${{ github.run_number }}
          name: TwitchProxy IPA (${{ github.run_number }})
          files: ${{ github.event.inputs.display_name }}.ipa
          body: |
            ## TwitchProxy Injected IPA

            ### Configuration
            - App name: ${{ github.event.inputs.app_name }}
            - Display name: ${{ github.event.inputs.display_name }}
            - Bundle ID override: ${{ github.event.inputs.bundle_id || 'none' }}

            ### Features
            - Native HLS playlist proxying for the Twitch iOS app
            - 1080p/1440p access through ReYohoho proxy servers
            - Server-side ad bypass request via `proxymode=adblock` (best effort, not full VAFT)
            - OAuth/auth-token forwarding for proxy compatibility

            ### Notes
            - Leave the bundle ID override empty unless you know you need to change it.
            - Changing the bundle ID can break Twitch login, chat, keychain, and app-group state.
            - `proxymode=adblock` depends on proxy server support and may not block every Twitch ad.
          draft: true

      - name: Output Release URL
        run: |
          echo "::notice::Release created"
          echo "::notice::Download at: https://github.com/${{ github.repository }}/releases/tag/twitch-proxy-${{ github.run_number }}"
