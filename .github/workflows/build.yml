name: Build TwitchProxy iOS

on:
  push:
    branches: [ main, master ]
    paths:
      - 'twitch.user.js'
      - 'Tweak.x'
      - 'Makefile'
      - 'control'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install make ldid dpkg

    - name: Set PATH environment variable
      run: |
        echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
        echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

    - name: Cache Theos
      id: theos
      uses: actions/cache@v4
      env:
        cache-name: theos_cache_twitch
      with:
        path: theos/
        key: ${{ env.cache-name }}
        restore-keys: ${{ env.cache-name }}

    - name: Setup Theos
      if: steps.theos.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: theos/theos
        ref: master
        path: theos
        submodules: recursive

    - name: Download iOS SDK
      if: steps.theos.outputs.cache-hit != 'true'
      run: |
        git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
        cd sdks
        git sparse-checkout set --no-cone iPhoneOS16.5.sdk
        git checkout
        mv *.sdk $THEOS/sdks
        ls -la $THEOS/sdks/

    - name: Create JS bundle
      run: |
        mkdir -p resources/Library/Application\ Support/TwitchProxy
        cp twitch.user.js resources/Library/Application\ Support/TwitchProxy/twitch_proxy.js

    - name: Build package
      run: |
        make clean
        make package DEBUG=0 FINALPACKAGE=1

    - name: Find package
      id: find-package
      run: |
        PACKAGE=$(find . -name "*.deb" -path "*/packages/*" | head -n 1)
        echo "package=$PACKAGE" >> $GITHUB_OUTPUT
        if [ -z "$PACKAGE" ]; then
          echo "❌ Package not found"
          exit 1
        fi
        echo "📦 Found package: $PACKAGE"

    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: TwitchProxy-deb
        path: ${{ steps.find-package.outputs.package }}
        retention-days: 90

    - name: Get package info
      id: package-info
      run: |
        PACKAGE=${{ steps.find-package.outputs.package }}
        VERSION=$(dpkg-deb -I $PACKAGE | grep "Version:" | awk '{print $2}')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📋 Package version: $VERSION"

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.package-info.outputs.version }}-${{ github.run_number }}
        name: TwitchProxy v${{ steps.package-info.outputs.version }}
        files: ${{ steps.find-package.outputs.package }}
        body: |
          ## 📱 TwitchProxy iOS Tweak v${{ steps.package-info.outputs.version }}

          ### ⚡ 설치 방법

          **터미널 앱 (New Terminal 2)에서:**
          ```bash
          dpkg -i TwitchProxy_*.deb
          killall -9 SpringBoard
          ```

          **Filza에서:**
          1. `.deb` 파일 탭
          2. 우측 상단 "설치" 클릭
          3. 재시작

          ### 📋 시스템 요구사항
          - ✅ Jailbroken iOS 11.0+
          - ✅ Substitute 또는 Substrate

          ### ✨ 기능
          - 🎬 1080p/1440p 화질 지원
          - 🚫 광고 차단 (VAFT)
          - 🌐 프록시 서버 자동 선택
          - 📺 Twitch 앱 및 Safari 지원

          ### 🔧 문제 해결
          작동하지 않으면:
          ```bash
          # 재시작
          killall -9 SpringBoard

          # 로그 확인
          log stream --predicate 'process == "Twitch"' --level debug
          ```

          ---
          📢 원본 프로젝트: [ReYohoho/Twitch Proxy](https://github.com/reyohoho/twitch_quality_proxy)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build summary
      run: |
        echo "### ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📦 **Package:** ${{ steps.find-package.outputs.package }}" >> $GITHUB_STEP_SUMMARY
        echo "🏷️ **Version:** ${{ steps.package-info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
        echo "- **Artifact:** Available in Actions run artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- **Release:** Check [Releases](https://github.com/${{ github.repository }}/releases) page" >> $GITHUB_STEP_SUMMARY
